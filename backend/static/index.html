<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DevDock — AI Developer Workspace Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{--bg:#0d0d1a;--card:#161625;--border:#2a2a3d;--accent:#7c3aed;--accent2:#a855f7;--text:#e2e8f0;--muted:#94a3b8}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;margin:0}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px}
  .badge-rule{background:#1e3a2f;color:#4ade80;padding:2px 8px;border-radius:9999px;font-size:11px}
  .badge-ai{background:#2d1b4e;color:#c084fc;padding:2px 8px;border-radius:9999px;font-size:11px}
  .badge-sens{background:#3b1a1a;color:#f87171;padding:2px 8px;border-radius:9999px;font-size:11px}
  .sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;cursor:pointer;transition:.2s;color:var(--muted);font-size:14px}
  .sidebar-item:hover,.sidebar-item.active{background:rgba(124,58,237,.15);color:var(--accent2)}
  .stat-card{padding:20px;border-radius:12px;background:var(--card);border:1px solid var(--border)}
  .stat-val{font-size:32px;font-weight:700;background:linear-gradient(135deg,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  input,select{background:#1e1e30;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;outline:none;width:100%;box-sizing:border-box}
  input:focus,select:focus{border-color:var(--accent)}
  button.btn-primary{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;padding:9px 20px;border-radius:8px;cursor:pointer;font-weight:600;transition:.2s}
  button.btn-primary:hover{opacity:.85}
  button.btn-sm{background:rgba(124,58,237,.2);color:#a855f7;border:1px solid var(--accent);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px}
  table{width:100%;border-collapse:collapse}
  th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left}
  td{padding:10px 14px;border-bottom:1px solid rgba(42,42,61,.5);font-size:13px}
  tr:hover td{background:rgba(124,58,237,.05)}
  .pill{display:inline-block;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600}
  .glow{box-shadow:0 0 20px rgba(124,58,237,.2)}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .pulse{animation:pulse 2s infinite}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API = 'http://localhost:8000/api';
let state = { page:'home', stats:{}, files:[], activity:[], rules:[], logs:[], duplicates:[], settings:{}, search:'', filterCat:'', loading:false, watcherActive:false, watcherPaused:false };

async function api(path, opts={}) {
  try { const r = await fetch(API+path, opts); return await r.json(); } catch(e) { return null; }
}

async function loadAll() {
  const [stats, activity, status, rules, dups] = await Promise.all([
    api('/stats'), api('/activity?limit=20'), api('/status'), api('/rules'), api('/duplicates')
  ]);
  if(stats) state.stats = stats;
  if(activity) state.activity = activity;
  if(status){ state.watcherActive = status.watcher_active; state.watcherPaused = status.watcher_paused; }
  if(rules) state.rules = rules;
  if(dups) state.duplicates = dups;
  render();
}

async function loadFiles(reset=false) {
  if(reset) state.files = [];
  const q = new URLSearchParams({ limit:50, search: state.search, category: state.filterCat }).toString();
  const data = await api('/files?'+q);
  if(data) state.files = data.files || [];
  render();
}

async function loadSettings() {
  const s = await api('/settings');
  if(s) state.settings = s;
  render();
}

async function saveSettings() {
  const key = document.getElementById('apiKey')?.value;
  const dup = document.getElementById('dupAction')?.value;
  const notif = document.getElementById('notifEnabled')?.checked;
  if(key && !key.startsWith('***')) await api('/settings', {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({groq_api_key: key})});
  if(dup) await api('/settings', {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({duplicate_action: dup})});
  await api('/settings', {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({notifications_enabled: notif})});
  alert('Settings saved!');
}

async function organizeNow() {
  const r = await api('/organize/now', {method:'POST'});
  if(r) { alert('Organization complete!'); loadAll(); }
}

async function pauseWatcher() {
  if(state.watcherPaused) { await api('/watcher/resume', {method:'POST'}); }
  else { await api('/watcher/pause', {method:'POST'}); }
  const s = await api('/status');
  if(s){ state.watcherActive = s.watcher_active; state.watcherPaused = s.watcher_paused; }
  render();
}

async function restoreFile(id) {
  const r = await api('/restore', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({record_id:id})});
  if(r?.success) { alert('File restored!'); loadFiles(); } else alert('Restore failed: '+(r?.detail||r?.error||'error'));
}

async function addRule() {
  const name = document.getElementById('rName')?.value;
  const cond = document.getElementById('rCond')?.value;
  const val = document.getElementById('rVal')?.value;
  const dest = document.getElementById('rDest')?.value;
  if(!name||!val||!dest) return alert('Fill all rule fields');
  await api('/rules', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,condition:cond,value:val,destination:dest})});
  document.getElementById('rName').value=''; document.getElementById('rVal').value=''; document.getElementById('rDest').value='';
  const rules = await api('/rules');
  if(rules) state.rules = rules;
  render();
}

async function deleteRule(id) {
  await api('/rules/'+id, {method:'DELETE'});
  const rules = await api('/rules');
  if(rules) state.rules = rules;
  render();
}

function fmt(bytes){ if(!bytes) return '0 B'; const k=1024; const s=['B','KB','MB','GB']; const i=Math.floor(Math.log(bytes)/Math.log(k)); return (bytes/Math.pow(k,i)).toFixed(1)+' '+s[i]; }
function fmtDate(ts){ if(!ts) return '-'; return new Date(ts).toLocaleString(); }
function shortPath(p){ if(!p) return '-'; const parts=p.replace(/\\/g,'/').split('/'); return parts.slice(-3).join('/'); }

function catColor(cat){
  const m={Python:'#3b82f6',JavaScript:'#eab308',TypeScript:'#06b6d4',Go:'#06d6a0',Rust:'#f97316',
  Docker:'#0ea5e9',AWS:'#f97316',Terraform:'#8b5cf6',Kubernetes:'#3b82f6',
  Document:'#94a3b8',Image:'#ec4899',Video:'#a855f7',Music:'#10b981',Archive:'#f59e0b',Dataset:'#6366f1'};
  for(const k in m) if(cat?.includes(k)) return m[k];
  return '#7c3aed';
}

let catChart=null, weekChart=null;
function drawCharts(){
  const catCtx=document.getElementById('catChart');
  const weekCtx=document.getElementById('weekChart');
  const dist = (state.stats.category_distribution||[]).slice(0,8);
  const weekly = state.stats.weekly_activity||[];
  if(catCtx && dist.length){
    if(catChart) catChart.destroy();
    catChart = new Chart(catCtx, { type:'doughnut', data:{ labels:dist.map(d=>d.category), datasets:[{data:dist.map(d=>d.cnt), backgroundColor:dist.map(d=>catColor(d.category)), borderWidth:0, hoverOffset:8}] }, options:{plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:12}}}}, cutout:'65%'} });
  }
  if(weekCtx && weekly.length){
    if(weekChart) weekChart.destroy();
    weekChart = new Chart(weekCtx, { type:'bar', data:{ labels:weekly.map(d=>d.day), datasets:[{label:'Files', data:weekly.map(d=>d.cnt), backgroundColor:'rgba(124,58,237,.7)', borderRadius:6}] }, options:{plugins:{legend:{display:false}}, scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'#2a2a3d'}},y:{ticks:{color:'#94a3b8'},grid:{color:'#2a2a3d'}}}} });
  }
}

function navItem(label, icon, page){
  return `<div class="sidebar-item ${state.page===page?'active':''}" onclick="navigate('${page}')"><i data-lucide="${icon}" style="width:16px;height:16px"></i>${label}</div>`;
}

function navigate(page){
  state.page=page;
  if(page==='files') loadFiles(true);
  if(page==='settings') loadSettings();
  render();
  setTimeout(()=>{ lucide.createIcons(); if(page==='home') setTimeout(drawCharts,100); },10);
}

function statsCard(label, val, icon, color){
  return `<div class="stat-card glow"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="color:var(--muted);font-size:12px;margin-bottom:6px">${label}</div><div class="stat-val">${val}</div></div><div style="background:${color}22;border-radius:10px;padding:10px"><i data-lucide="${icon}" style="width:20px;height:20px;color:${color}"></i></div></div></div>`;
}

function renderHome(){
  const s = state.stats;
  return `
  <h1 style="font-size:22px;font-weight:700;margin-bottom:20px">Dashboard Overview</h1>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px">
    ${statsCard('Total Organized', s.total||0, 'folder-check', '#7c3aed')}
    ${statsCard("Today's Files", s.today||0, 'calendar', '#06b6d4')}
    ${statsCard('AI Classified', s.ai_classified||0, 'brain', '#a855f7')}
    ${statsCard('Duplicates', s.duplicates||0, 'copy', '#f97316')}
    ${statsCard('Sensitive', s.sensitive||0, 'shield-alert', '#ef4444')}
    ${statsCard('Storage', fmt(s.total_size_bytes||0), 'hard-drive', '#10b981')}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
    <div class="card" style="padding:20px"><div style="font-weight:600;margin-bottom:14px">Category Distribution</div><canvas id="catChart" height="200"></canvas></div>
    <div class="card" style="padding:20px"><div style="font-weight:600;margin-bottom:14px">Weekly Activity</div><canvas id="weekChart" height="200"></canvas></div>
  </div>
  <div class="card" style="padding:20px">
    <div style="font-weight:600;margin-bottom:14px">Recent Activity</div>
    <table><thead><tr><th>File</th><th>Category</th><th>Destination</th><th>Time</th><th>Method</th></tr></thead><tbody>
    ${(state.activity||[]).map(a=>`<tr><td style="font-family:monospace;color:#c084fc">${a.filename||a.action||'-'}</td><td>${a.details||'-'}</td><td>-</td><td style="color:var(--muted)">${fmtDate(a.timestamp)}</td><td><span class="badge-rule">${a.status}</span></td></tr>`).join('')}
    </tbody></table>
  </div>`;
}

function renderFiles(){
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <h1 style="font-size:22px;font-weight:700">All Files</h1>
    <div style="display:flex;gap:10px">
      <input id="searchBox" style="width:220px" placeholder="Search files..." value="${state.search}" oninput="state.search=this.value" onkeydown="if(event.key==='Enter')loadFiles(true)"/>
      <select id="catFilter" onchange="state.filterCat=this.value;loadFiles(true)" style="width:150px">
        <option value="">All Categories</option>
        ${['Document','Image','Video','Music','Archive','Python','JavaScript','TypeScript','Go','Rust','Docker','AWS','Kubernetes','Terraform','SSH Key','Certificate','Dataset','Project'].map(c=>`<option value="${c}" ${state.filterCat===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <button class="btn-primary" onclick="loadFiles(true)">Search</button>
    </div>
  </div>
  <div class="card" style="overflow:auto">
  <table><thead><tr><th>Filename</th><th>Category</th><th>Destination</th><th>Size</th><th>Date</th><th>Method</th><th>Actions</th></tr></thead><tbody>
  ${state.files.map(f=>`<tr>
    <td style="font-family:monospace;color:#c084fc;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.filename}</td>
    <td><span class="pill" style="background:${catColor(f.category)}22;color:${catColor(f.category)}">${f.category||'?'}</span></td>
    <td style="color:var(--muted);font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis">${shortPath(f.destination_path)}</td>
    <td style="color:var(--muted)">${fmt(f.file_size)}</td>
    <td style="color:var(--muted);font-size:12px">${fmtDate(f.timestamp)}</td>
    <td>${f.ai_used?'<span class="badge-ai">AI</span>':'<span class="badge-rule">Rule</span>'} ${f.is_sensitive?'<span class="badge-sens">🔒</span>':''}</td>
    <td><button class="btn-sm" onclick="restoreFile(${f.id})">Restore</button></td>
  </tr>`).join('')}
  </tbody></table>
  </div>`;
}

function renderSettings(){
  const s = state.settings;
  return `
  <h1 style="font-size:22px;font-weight:700;margin-bottom:20px">Settings</h1>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="card" style="padding:24px">
      <div style="font-weight:600;margin-bottom:16px;color:var(--accent2)">🤖 AI Configuration</div>
      <label style="font-size:13px;color:var(--muted)">Groq API Key</label>
      <input id="apiKey" type="password" placeholder="gsk_..." value="${s.groq_api_key||''}" style="margin:8px 0 16px"/>
      <label style="font-size:13px;color:var(--muted)">Groq Model</label>
      <select style="margin:8px 0 0">
        <option selected>llama-3.3-70b-versatile</option>
        <option>mixtral-8x7b-32768</option>
        <option>gemma2-9b-it</option>
      </select>
    </div>
    <div class="card" style="padding:24px">
      <div style="font-weight:600;margin-bottom:16px;color:var(--accent2)">⚙️ Behavior</div>
      <label style="font-size:13px;color:var(--muted)">Duplicate Action</label>
      <select id="dupAction" style="margin:8px 0 16px">
        <option value="rename" ${s.duplicate_action==='rename'?'selected':''}>Rename (add _copy)</option>
        <option value="skip" ${s.duplicate_action==='skip'?'selected':''}>Skip duplicate</option>
        <option value="replace" ${s.duplicate_action==='replace'?'selected':''}>Replace original</option>
        <option value="keep_both" ${s.duplicate_action==='keep_both'?'selected':''}>Keep both</option>
      </select>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input id="notifEnabled" type="checkbox" ${s.notifications_enabled?'checked':''}/> <span style="font-size:13px">Enable notifications</span>
      </label>
    </div>
    <div class="card" style="padding:24px">
      <div style="font-weight:600;margin-bottom:16px;color:var(--accent2)">📁 Monitored Folders</div>
      ${(s.monitored_folders||[]).map(f=>`<div style="font-size:13px;color:var(--muted);padding:8px;background:#1e1e30;border-radius:6px;margin-bottom:6px;font-family:monospace">${f}</div>`).join('')}
    </div>
    <div class="card" style="padding:24px">
      <div style="font-weight:600;margin-bottom:16px;color:var(--accent2)">📋 Custom Rules</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <input id="rName" placeholder="Rule name"/>
        <select id="rCond"><option value="filename_contains">Name contains</option><option value="extension_equals">Extension equals</option><option value="filename_starts_with">Name starts with</option></select>
        <input id="rVal" placeholder="Value (e.g. leetcode)"/>
        <input id="rDest" placeholder="Destination (e.g. Programming/DSA)"/>
      </div>
      <button class="btn-primary" onclick="addRule()">Add Rule</button>
      <div style="margin-top:14px">
        ${state.rules.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:#1e1e30;border-radius:6px;margin-bottom:6px">
          <span style="font-size:13px">${r.name}: if ${r.condition} "${r.value}" → ${r.destination}</span>
          <button class="btn-sm" onclick="deleteRule(${r.id})" style="color:#f87171;border-color:#f87171">Delete</button>
        </div>`).join('')}
      </div>
    </div>
  </div>
  <div style="margin-top:20px"><button class="btn-primary" onclick="saveSettings()">💾 Save Settings</button></div>`;
}

function renderDuplicates(){
  return `
  <h1 style="font-size:22px;font-weight:700;margin-bottom:20px">Duplicate Files</h1>
  <div class="card" style="overflow:auto">
    <table><thead><tr><th>Hash (SHA-256)</th><th>Files</th><th>Count</th><th>Detected</th></tr></thead><tbody>
    ${state.duplicates.map(d=>`<tr>
      <td style="font-family:monospace;font-size:11px;color:var(--muted)">${(d.sha256_hash||'').substring(0,16)}...</td>
      <td style="font-size:12px;color:#c084fc">${d.filenames||'-'}</td>
      <td><span class="pill" style="background:#f9731622;color:#f97316">${d.count}x</span></td>
      <td style="color:var(--muted);font-size:12px">${fmtDate(d.detected_at)}</td>
    </tr>`).join('')}
    </tbody></table>
    ${!state.duplicates.length?'<div style="text-align:center;padding:40px;color:var(--muted)">No duplicates found ✓</div>':''}
  </div>`;
}

function renderLogs(){
  return `
  <h1 style="font-size:22px;font-weight:700;margin-bottom:20px">Activity Logs</h1>
  <div class="card" style="overflow:auto">
    <table><thead><tr><th>Time</th><th>Action</th><th>File</th><th>Details</th><th>Status</th></tr></thead><tbody>
    ${state.activity.map(a=>`<tr>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">${fmtDate(a.timestamp)}</td>
      <td><span class="pill" style="background:#7c3aed22;color:#a855f7">${a.action}</span></td>
      <td style="font-family:monospace;font-size:12px;color:#c084fc">${a.filename||'-'}</td>
      <td style="color:var(--muted);font-size:12px;max-width:250px;overflow:hidden;text-overflow:ellipsis">${a.details||'-'}</td>
      <td><span class="${a.status==='success'?'badge-rule':'badge-sens'}">${a.status}</span></td>
    </tr>`).join('')}
    </tbody></table>
  </div>`;
}

function renderPage(){
  switch(state.page){
    case 'home': return renderHome();
    case 'files': return renderFiles();
    case 'duplicates': return renderDuplicates();
    case 'logs': return renderLogs();
    case 'settings': return renderSettings();
    default: return `<div style="color:var(--muted);padding:40px;text-align:center">Page coming soon</div>`;
  }
}

function render(){
  const el = document.getElementById('app');
  el.innerHTML = `
  <div style="display:flex;height:100vh;overflow:hidden">
    <div style="width:220px;background:#12121f;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px;flex-shrink:0;overflow-y:auto">
      <div style="padding:16px 8px 24px;border-bottom:1px solid var(--border);margin-bottom:16px">
        <div style="font-size:22px;font-weight:800;background:linear-gradient(135deg,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent">DevDock</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">AI Workspace Manager</div>
      </div>
      <div style="margin-bottom:8px;font-size:11px;color:var(--muted);padding:0 8px;text-transform:uppercase;letter-spacing:.05em">Monitor</div>
      ${navItem('Home','layout-dashboard','home')}
      ${navItem('All Files','files','files')}
      ${navItem('Duplicate Files','copy','duplicates')}
      <div style="margin:16px 0 8px;font-size:11px;color:var(--muted);padding:0 8px;text-transform:uppercase;letter-spacing:.05em">System</div>
      ${navItem('Activity Logs','scroll-text','logs')}
      ${navItem('Settings','settings','settings')}
      <div style="margin-top:auto;padding:12px;background:#1e1e30;border-radius:8px;margin-top:16px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="width:8px;height:8px;border-radius:50%;background:${state.watcherActive&&!state.watcherPaused?'#4ade80':'#f97316'};display:inline-block" class="${state.watcherActive&&!state.watcherPaused?'pulse':''}"></span>
          <span style="font-size:12px;color:var(--muted)">${state.watcherPaused?'Paused':state.watcherActive?'Monitoring':'Stopped'}</span>
        </div>
        <button class="btn-sm" onclick="pauseWatcher()" style="width:100%;margin-bottom:6px">${state.watcherPaused?'▶ Resume':'⏸ Pause'}</button>
        <button class="btn-sm" onclick="organizeNow()" style="width:100%">⚡ Organize Now</button>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:28px">
      ${renderPage()}
    </div>
  </div>`;
  setTimeout(()=>{ lucide.createIcons(); if(state.page==='home') setTimeout(drawCharts,50); },10);
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
